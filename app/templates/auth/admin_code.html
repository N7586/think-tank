{% extends "base.html" %}

{% block title %}Vérification Admin - TSI{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 border-start border-4 border-warning">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-warning" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold mt-3">Accès Administrateur</h2>
                        <p class="text-muted">Entrez le code d'autorisation pour continuer</p>
                    </div>

                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Code d'autorisation</label>
                            <input type="password" name="admin_code" class="form-control form-control-lg text-center"
                                   placeholder="•••••" maxlength="10" required autofocus
                                   style="letter-spacing: 8px; font-size: 1.5rem;">
                        </div>

                        <button type="submit" class="btn btn-warning btn-lg w-100 mb-3 fw-semibold">
                            <i class="bi bi-unlock me-2"></i>Vérifier le code
                        </button>
                    </form>

                    <div class="text-center">
                        <a href="{{ url_for('main.home') }}" class="text-muted text-decoration-none small">
                            <i class="bi bi-arrow-left me-1"></i>Retour à l'accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
