{% extends "base.html" %}

{% block title %}Contact - TSI{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="fw-bold text-center mb-4">Contactez-nous</h1>
            <p class="lead text-center text-muted mb-5">
                Une question, une suggestion ? N'hésitez pas à nous écrire.
            </p>

            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body text-center">
                            <i class="bi bi-envelope text-primary" style="font-size: 2rem;"></i>
                            <h6 class="fw-bold mt-2">Email</h6>
                            <p class="text-muted small">contact@tsi-institute.org</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body text-center">
                            <i class="bi bi-geo-alt text-primary" style="font-size: 2rem;"></i>
                            <h6 class="fw-bold mt-2">Adresse</h6>
                            <p class="text-muted small">Afrique</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body text-center">
                            <i class="bi bi-globe text-primary" style="font-size: 2rem;"></i>
                            <h6 class="fw-bold mt-2">Web</h6>
                            <p class="text-muted small">tsi-institute.org</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Nom complet</label>
                                <input type="text" name="name" class="form-control" required placeholder="Votre nom">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" name="email" class="form-control" required placeholder="votre@email.com">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Sujet</label>
                            <input type="text" name="subject" class="form-control" required placeholder="Sujet de votre message">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Message</label>
                            <textarea name="message" class="form-control" rows="5" required placeholder="Votre message..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-send me-2"></i>Envoyer le message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
