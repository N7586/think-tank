{% extends "base.html" %}

{% block title %}Modifier utilisateur - Admin TSI{% endblock %}

{% block content %}
<div class="container-fluid py-5 mt-4">
    <div class="row">
        <div class="col-lg-2 bg-dark min-vh-100 position-fixed d-none d-lg-block" style="padding-top: 80px;">
            <nav class="nav flex-column p-3">
                <a class="nav-link text-light" href="{{ url_for('admin.dashboard') }}">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a class="nav-link text-light active" href="{{ url_for('admin.users_list') }}">
                    <i class="bi bi-people me-2"></i>Utilisateurs
                </a>
                <a class="nav-link text-light" href="{{ url_for('blog.index') }}">
                    <i class="bi bi-journal-text me-2"></i>Blog
                </a>
                <a class="nav-link text-light" href="{{ url_for('arf.index') }}">
                    <i class="bi bi-coin me-2"></i>ARF
                </a>
                <a class="nav-link text-light" href="{{ url_for('marketplace.index') }}">
                    <i class="bi bi-shop me-2"></i>Marketplace
                </a>
                <hr class="border-secondary">
                <a class="nav-link text-light" href="{{ url_for('main.home') }}">
                    <i class="bi bi-house me-2"></i>Retour au site
                </a>
            </nav>
        </div>

        <div class="col-lg-10 offset-lg-2">
            <div class="p-4">
                <a href="{{ url_for('admin.user_detail', user_id=user.id) }}" class="text-decoration-none text-muted">
                    <i class="bi bi-arrow-left me-1"></i>Retour au profil
                </a>
                <h1 class="fw-bold mt-2 mb-4">Modifier {{ user.full_name }}</h1>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form method="POST">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Prénom</label>
                                    <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Nom</label>
                                    <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Téléphone</label>
                                    <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Langue</label>
                                    <select name="language" class="form-select">
                                        <option value="fr" {% if user.language == 'fr' %}selected{% endif %}>Français</option>
                                        <option value="en" {% if user.language == 'en' %}selected{% endif %}>English</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Nouveau mot de passe (laisser vide pour conserver)</label>
                                    <input type="password" name="new_password" class="form-control" minlength="6">
                                </div>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-end gap-2">
                                <a href="{{ url_for('admin.user_detail', user_id=user.id) }}" class="btn btn-outline-secondary">Annuler</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i>Enregistrer
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
